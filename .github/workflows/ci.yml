name: CI/CD Pipeline

on:
  push:
  pull_request:

jobs:
  ci-worker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '26'

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Run Vitest Suite
        run: pnpm test

  ci-infra:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./infra
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v4

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform fmt
        run: terraform fmt -check
        continue-on-error: true

      - name: Terraform Validate
        run: terraform validate -no-color

  cd-worker:
    needs: [ci-worker, ci-infra]
    if: ${{ github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, '[skip-cd]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to Cloudflare Edge
        env:
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          cat <<EOF > metadata.json
          {
            "main_module": "worker.js",
            "bindings": [
              {
                "type": "plain_text",
                "name": "REGISTRY_BASE_URL",
                "text": "https://apt.fury.io"
              }
            ]
          }
          EOF

          HTTP_STATUS=$(curl -s -o response.json -w "%{http_code}" -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/workers/scripts/furyous-worker" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -F "metadata=@metadata.json;type=application/json" \
            -F "worker.js=@src/worker.js;type=application/javascript+module")

          if [ "$HTTP_STATUS" -eq 200 ]; then
            echo "✅ Worker successfully deployed to Cloudflare!"
          else
            echo "❌ Deployment failed with HTTP $HTTP_STATUS"
            cat response.json
            exit 1
          fi
