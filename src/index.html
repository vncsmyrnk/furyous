<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>furyous | Fury registry latest version</title>
  <style>
    body { font-family: monospace; max-width: 600px; margin: 40px auto; padding: 20px; background: #121212; color: #e0e0e0; line-height: 1.5; }
    h1 { color: #fff; border-bottom: 1px solid #333; padding-bottom: 10px; }
    code { background: #000; padding: 2px 4px; border-radius: 3px; color: #0f0; }
    .box { background: #1e1e1e; padding: 15px; border: 1px solid #333; border-radius: 4px; margin-top: 20px; }
    input, button { background: #000; color: #fff; border: 1px solid #444; padding: 10px; margin: 5px 0 15px 0; font-family: monospace; width: 100%; box-sizing: border-box; }
    input:focus { border-color: #0f0; outline: none; }
    button { cursor: pointer; font-weight: bold; }
    button:hover { background: #333; }
    a { color: #0f0; text-decoration: none; border-bottom: 1px dashed #0f0; transition: all 0.2s; }
    a:hover { color: #fff; border-bottom-color: #fff; }
    .footer { margin-top: 40px; text-align: center; font-size: 0.9em; color: #888; border-top: 1px solid #333; padding-top: 20px; }
  </style>
</head>
<body>
  <h1>furyous</h1>
  <p>Edge SemVer resolver for fury APT package registries.</p>

  <div class="box">
    <h3>CLI Usage</h3>
    <p><code>curl "https://furyous.vncsmyrnk.dev/?pkg=&lt;package&gt;&amp;user=&lt;username&gt;"</code></p>
  </div>

  <div class="box">
    <h3>URL Builder</h3>
    <form method="GET" action="/">
      <label for="pkg">Package Name (pkg):</label>
      <input type="text" id="pkg" name="pkg" required placeholder="shell-utils">

      <label for="user">Username (user):</label>
      <input type="text" id="user" name="user" required placeholder="vncsmyrnk">

      <button type="submit">Generate & Test</button>
    </form>
  </div>
  <div class="footer">
    furyous is open-source.
    View the code on <a href="https://github.com/vncsmyrnk/furyous" target="_blank" rel="noopener noreferrer">GitHub</a>.
  </div>
</body>
</html>
